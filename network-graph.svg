<svg width="480" height="320" xmlns="http://www.w3.org/2000/svg" style="background:#0f172a;border-radius:12px">
  <!-- Grid -->
  <line x1="20" y1="15" x2="20" y2="285" stroke="#1e293b" stroke-width="1"/>
  <line x1="20" y1="285" x2="460" y2="285" stroke="#1e293b" stroke-width="1"/>
  <line x1="20" y1="15" x2="460" y2="15" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="20" y1="95" x2="460" y2="95" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="20" y1="175" x2="460" y2="175" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="20" y1="255" x2="460" y2="255" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="100" y1="15" x2="100" y2="285" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="180" y1="15" x2="180" y2="285" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="260" y1="15" x2="260" y2="285" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="340" y1="15" x2="340" y2="285" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="420" y1="15" x2="420" y2="285" stroke="#1e293b" stroke-width="0.5"/>

  <!-- Edge: VP Sales ↔ VP Marketing (0.84) -->
  <line x1="195" y1="80" x2="262" y2="70" stroke="#ff2d55" stroke-width="2" stroke-opacity="0.8"/>
  <text x="228" y="92" fill="#ff2d55" font-size="9" font-family="monospace" text-anchor="middle">0.84</text>

  <!-- Edge: VP Engineering ↔ Dir. Engineering (0.81) -->
  <line x1="65" y1="80" x2="118" y2="155" stroke="#8b5cf6" stroke-width="2" stroke-opacity="0.8"/>
  <text x="44" y="125" fill="#8b5cf6" font-size="9" font-family="monospace">0.81</text>

  <!-- Edge: VP Sales ↔ Revenue Leader (0.54) -->
  <line x1="195" y1="80" x2="348" y2="225" stroke="#eab308" stroke-width="1.5" stroke-dasharray="5 3" stroke-opacity="0.8"/>
  <text x="290" y="162" fill="#eab308" font-size="9" font-family="monospace">0.54</text>

  <!-- Edge: VP Sales ↔ CRO (0.24) -->
  <line x1="195" y1="80" x2="44" y2="233" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 3" stroke-opacity="0.8"/>
  <text x="95" y="210" fill="#f97316" font-size="9" font-family="monospace">0.24</text>

  <!-- Node: VP of Engineering -->
  <circle cx="65" cy="80" r="11" fill="#3b82f6"/>
  <text x="65" y="59" fill="#e2e8f0" font-size="10" font-family="monospace" text-anchor="middle" font-weight="bold">VP of Engineering</text>

  <!-- Node: VP of Sales -->
  <circle cx="195" cy="80" r="11" fill="#06b6d4"/>
  <text x="195" y="59" fill="#e2e8f0" font-size="10" font-family="monospace" text-anchor="middle" font-weight="bold">VP of Sales</text>

  <!-- Node: VP of Marketing -->
  <circle cx="262" cy="70" r="11" fill="#ec4899"/>
  <text x="310" y="52" fill="#e2e8f0" font-size="10" font-family="monospace" text-anchor="middle" font-weight="bold">VP of Marketing</text>

  <!-- Node: Dir. of Engineering -->
  <circle cx="118" cy="155" r="11" fill="#3b82f6" fill-opacity="0.55"/>
  <text x="155" y="180" fill="#e2e8f0" font-size="10" font-family="monospace" text-anchor="middle" font-weight="bold">Dir. of Engineering</text>

  <!-- Node: Revenue Leader -->
  <circle cx="348" cy="225" r="11" fill="#eab308"/>
  <text x="348" y="249" fill="#e2e8f0" font-size="10" font-family="monospace" text-anchor="middle" font-weight="bold">Revenue Leader</text>

  <!-- Node: CRO -->
  <circle cx="44" cy="233" r="11" fill="#f97316"/>
  <text x="44" y="257" fill="#e2e8f0" font-size="10" font-family="monospace" text-anchor="middle" font-weight="bold">CRO</text>

  <!-- Legend -->
  <line x1="30" y1="308" x2="44" y2="308" stroke="#ff2d55" stroke-width="2"/>
  <text x="48" y="312" fill="#94a3b8" font-size="9" font-family="monospace">cross-dept</text>
  <line x1="130" y1="308" x2="144" y2="308" stroke="#eab308" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="148" y="312" fill="#94a3b8" font-size="9" font-family="monospace">title drift</text>
  <line x1="218" y1="308" x2="232" y2="308" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="236" y="312" fill="#94a3b8" font-size="9" font-family="monospace">acronym</text>
  <line x1="304" y1="308" x2="318" y2="308" stroke="#8b5cf6" stroke-width="2"/>
  <text x="322" y="312" fill="#94a3b8" font-size="9" font-family="monospace">conflation</text>
</svg>
